name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile
        run: python -m compileall scripts tests

      - name: Offline tests
        run: python tests/run_tests.py

  github_release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

  clawhub_publish:
    name: ClawHub Publish
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ secrets.CLAWHUB_TOKEN != '' }}
    env:
      CLAWHUB_DISABLE_TELEMETRY: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Login (token)
        run: clawhub login --token "${{ secrets.CLAWHUB_TOKEN }}" --no-browser

      - name: Publish
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          clawhub publish . \
            --no-input \
            --slug hk-weather-hko \
            --name "HK Weather (HKO)" \
            --version "$VERSION" \
            --changelog "Release $VERSION" \
            --tags latest
