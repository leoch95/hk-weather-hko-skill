name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Required when running manually.'
        required: true
        type: string

# NOTE: `secrets.*` is NOT allowed in job-level `if:` expressions (workflow validation error).
# We map secrets into env first, then use env in job conditionals.
env:
  CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile
        run: python -m compileall scripts tests

      - name: Offline tests
        run: python tests/run_tests.py

  github_release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true

  clawhub_publish:
    name: ClawHub Publish
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ env.CLAWHUB_TOKEN != '' }}
    env:
      CLAWHUB_DISABLE_TELEMETRY: '1'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ClawHub CLI
        run: npm i -g clawhub

      - name: Login (token)
        run: clawhub login --token "${{ env.CLAWHUB_TOKEN }}" --no-browser

      - name: Publish
        run: |
          VERSION="${RELEASE_TAG#v}"
          clawhub publish . \
            --no-input \
            --slug hk-weather-hko \
            --name "HK Weather (HKO)" \
            --version "$VERSION" \
            --changelog "Release $VERSION" \
            --tags latest
