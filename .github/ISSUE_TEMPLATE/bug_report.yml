name: Bug report
description: Report a reproducible bug.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Provide steps so we can reproduce the behavior.
      placeholder: |
        1. Run ...
        2. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste relevant logs/output (redact secrets).
      render: shell

  - type: input
    id: version
    attributes:
      label: Version
      description: Skill/repo version (e.g. v0.1.0) or commit SHA.
      placeholder: v0.1.0

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS + Python version.
      placeholder: "macOS 14 / Python 3.11"
